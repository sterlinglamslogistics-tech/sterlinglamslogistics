<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sterlin Driver — Offline</title>
  <meta name="theme-color" content="#16a34a" />
  <style>
    /* Everything inline so this file works with zero network. No CDN,
       no Google fonts, no external assets — it must render offline. */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      background: #fff;
      color: #111827;
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .topbar {
      background: #16a34a;
      height: 6px;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 32px;
      text-align: center;
    }
    .icon {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .icon svg { width: 44px; height: 44px; stroke: #6b7280; }
    h1 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #111827;
    }
    p {
      font-size: 15px;
      line-height: 1.5;
      color: #6b7280;
      max-width: 320px;
      margin-bottom: 32px;
    }
    .status {
      font-size: 13px;
      color: #9ca3af;
      margin-top: 18px;
      min-height: 18px;
    }
    .retry {
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 14px 48px;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(22,163,74,.25);
      cursor: pointer;
      transition: transform .1s, background .15s;
    }
    .retry:active { transform: scale(0.97); background: #15803d; }
    .retry:disabled { opacity: 0.55; cursor: not-allowed; }
    footer {
      padding: 14px;
      text-align: center;
      font-size: 11px;
      color: #d1d5db;
    }
    /* Tiny "online" dot that pulses while we wait for the network */
    .pulse {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 1.6s ease-in-out infinite;
    }
    .pulse.online { background: #16a34a; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.4); }
    }
  </style>
</head>
<body>
  <div class="topbar"></div>
  <main>
    <div class="icon" aria-hidden="true">
      <!-- Wifi-off icon, inline SVG -->
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="2" y1="2" x2="22" y2="22"/>
        <path d="M8.5 16.5a5 5 0 0 1 7 0"/>
        <path d="M2 8.82a15 15 0 0 1 4.17-2.65"/>
        <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/>
        <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"/>
        <path d="M5 13a10 10 0 0 1 5.24-2.76"/>
        <circle cx="12" cy="20" r="0.5" fill="currentColor"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Check your mobile data or Wi-Fi connection. We'll bring you back as soon as you're online again.</p>
    <button class="retry" id="retryBtn" type="button">Try Again</button>
    <div class="status" id="status">
      <span class="pulse" id="dot"></span>
      <span id="statusText">Waiting for connection…</span>
    </div>
  </main>
  <footer>Sterlin Glams Driver App</footer>

  <script>
    // Try to bounce back to the live app whenever a connection looks up.
    // Three triggers: (1) the browser fires `online`, (2) the Retry button,
    // (3) a periodic background check (every 5s, lightweight HEAD probe).
    var TARGET = "https://sterlinglamslogistics.com/driver";
    var retryBtn = document.getElementById("retryBtn");
    var statusText = document.getElementById("statusText");
    var dot = document.getElementById("dot");
    var checking = false;

    function setStatus(text, online) {
      statusText.textContent = text;
      dot.classList.toggle("online", !!online);
    }

    async function tryReconnect(reason) {
      if (checking) return;
      checking = true;
      retryBtn.disabled = true;
      setStatus("Checking connection…");
      try {
        // Cheap probe: HEAD on the origin. cache: 'no-store' to avoid
        // browser cache giving a false positive.
        var res = await fetch(TARGET, { method: "GET", cache: "no-store", mode: "no-cors" });
        // Any response (even opaque from no-cors) means the network is up.
        if (res) {
          setStatus("Connected — opening app…", true);
          // Tiny delay so the user actually sees the green dot before reload.
          setTimeout(function () { window.location.replace(TARGET); }, 350);
          return;
        }
      } catch (e) {
        setStatus("Still no connection. Try again in a moment.");
      }
      retryBtn.disabled = false;
      checking = false;
    }

    retryBtn.addEventListener("click", function () { tryReconnect("button"); });
    window.addEventListener("online", function () { tryReconnect("event"); });
    // Background poll while this page is visible — drops out the moment
    // the user navigates away or the page is hidden.
    var poll = setInterval(function () {
      if (document.visibilityState === "visible" && navigator.onLine) {
        tryReconnect("poll");
      }
    }, 5000);
    document.addEventListener("visibilitychange", function () {
      if (document.visibilityState !== "visible") clearInterval(poll);
    });
  </script>
</body>
</html>
